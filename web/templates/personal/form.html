{% extends "base.html" %}
{% block content %}
  <header class="page-head">
    <h1>{{ titel }}</h1>
    <a class="btn" href="/personal">← Zurück</a>
  </header>

  <section class="card card-form">
    <form method="post"
          action="{% if ma %}/personal/{{ ma.id }}/bearbeiten{% else %}/personal/neu{% endif %}">
      <div class="grid2">
        <label>Vorname
          <input type="text" name="vorname" required value="{{ ma.vorname if ma else '' }}">
        </label>
        <label>Name
          <input type="text" name="name" required value="{{ ma.name if ma else '' }}">
        </label>
        <label>Abteilung
          <input type="text" name="abteilung" value="{{ ma.abteilung if ma else '' }}">
        </label>
        <label>Position
          <input type="text" name="position" value="{{ ma.position if ma else '' }}">
        </label>
        <label>Urlaubsanspruch (Tage/Jahr)
          <input type="number" name="urlaubsanspruch" min="0" max="365"
                 value="{{ ma.urlaubsanspruch if ma else 30 }}">
        </label>
        <label>Sollstunden pro Tag
          <input type="number" name="sollstunden_tag" min="0" max="24" step="0.5"
                 value="{{ ma.sollstunden_tag if ma else 8 }}">
        </label>
        <label class="check">
          <input type="checkbox" name="personalverantwortlich" value="true"
                 {% if ma and ma.personalverantwortlich %}checked{% endif %}>
          Personalverantwortlich
        </label>
      </div>
      <div class="form-actions">
        <a class="btn" href="/personal">Abbrechen</a>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </div>
    </form>
  </section>
{% endblock %}
