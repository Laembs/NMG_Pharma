<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ titel|default("NMGone-Web") }} · Pharma-Suite</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B4A86">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <script src="/static/htmx.min.js" defer></script>
  <script>
    // PWA: Service Worker registrieren (eigenes App-Icon, „zum Startbildschirm
    // hinzufügen", Cache-Notnagel bei Netzausfall). Im Desktop-Fenster (pywebview)
    // schadet es nicht; ohne HTTPS/localhost wird es vom Browser ignoriert.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function () {});
      });
    }
  </script>
</head>
<body hx-boost="true">
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Pharma&nbsp;Suite</div>
      {% if user %}
      <div class="firma">{{ user.firma_name }}</div>
      <nav>
        <a href="/dashboard" class="navlink {% if request.url.path == '/dashboard' %}aktiv{% endif %}">Übersicht</a>
        {% for m in nav_module %}
          {% if m.ready %}
            <a href="/{{ m.key }}" class="navlink {% if request.url.path.startswith('/' ~ m.key) %}aktiv{% endif %}">{{ m.titel }}</a>
          {% else %}
            <span class="navlink gesperrt" title="In Vorbereitung">{{ m.titel }} <em>bald</em></span>
          {% endif %}
        {% endfor %}
      </nav>
      <div class="sidebar-foot">
        <div class="who">{{ user.anzeigename }}</div>
        <a href="/logout" class="abmelden">Abmelden</a>
      </div>
      {% endif %}
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
